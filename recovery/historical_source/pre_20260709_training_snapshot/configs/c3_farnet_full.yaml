seed: 79
output_dir: E:/perception/friction_affordance_runs/c3_farnet_full_root

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  name: c3_farnet
  backbone: convnext_tiny
  embedding_dim: 768
  pretrained: false
  dropout: 0.2
  token_dim: 256
  pair_rank: 8
  triple_rank: 16
  head:
    type: coupled_tensor
  head_type: coupled_tensor
  use_dry_vor: true
  use_physics_branch: true
  physics_dim: 96
  physics_quality_cues: true
  physics_quality_region_cues: false
  boundary_use_physics_feature: true
  use_semantic_physics_attention_branch: true
  semantic_physics_attention_dim: 64
  use_local_physics_field_branch: true
  local_physics_field_dim: 64
  local_physics_field_scale: 0.08
  use_dry_concrete_roughness_vor_residual: true
  dry_concrete_roughness_hidden_dim: 48
  dry_concrete_roughness_scale: 0.12
  dry_concrete_roughness_gate_threshold: 0.12
  dry_concrete_roughness_gate_temperature: 14.0
  roughness_reliability_use_coupling_context: true

loss:
  use_factor_ce: true
  use_tournament: true
  use_counterfactual: true
  use_reliability: true
  factor_weight: 0.3
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.0
  tournament_weight: 0.12
  counterfactual_weight: 0.05
  reliability_weight: 0.05
  counterfactual_margin: 1.0
  supervise_none: false

optimizer:
  type: AdamW
  lr: 0.000035
  weight_decay: 0.003

scheduler:
  type: none

train:
  resume_from: E:/perception/friction_affordance_runs/c3_farnet_stage3_reliability_root/best_checkpoint.pth
  trainable_prefixes:
    - norm
    - decoder
    - roughness_reliability
    - coupled_head
    - boundary_experts
    - linear_head
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 2
  prefetch_factor: 2
  lr: 0.000035
  weight_decay: 0.003
  epochs: 8
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 16000
  grad_clip_norm: 5.0
  log_every_steps: 120

eval:
  batch_size: 16
