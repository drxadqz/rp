seed: 79
output_dir: D:\NMI_SPWFM_datasets\friction_affordance_outputs\direct_visual_friction\extreme_road_global_convnext_fast
device: auto
data:
  train_manifests:
  - data/manifests_extreme/extreme_road_train.csv
  val_manifests:
  - data/manifests_extreme/extreme_road_val.csv
  test_manifests:
  - data/manifests_extreme/extreme_road_test.csv
  image_size: 192
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
  max_train_samples_per_class: null
  max_val_samples_per_class: null
  max_test_samples_per_class: null
  balanced_sampling: true
  balanced_dataset_first: false
  balanced_group_columns:
  - class_label
  balanced_num_samples_per_epoch: 6000
  sample_seed: 79
  augmentation:
    random_resized_crop: false
    resize_mode: letterbox
    color_jitter:
      brightness: 0.35
      contrast: 0.35
      saturation: 0.18
      hue: 0.035
    random_grayscale_p: 0.08
    gaussian_blur_p: 0.12
    blur_sigma:
    - 0.1
    - 1.1
    random_erasing_p: 0.04
    erase_scale:
    - 0.015
    - 0.07
    gray_world_alpha: 0.5
    fourier_low_freq_jitter_p: 0.25
    fourier_beta: 0.08
    fourier_strength:
    - 0.75
    - 1.25
model:
  backbone: convnext_tiny
  embedding_dim: 768
  dropout: 0.28
  pretrained: true
  freeze_backbone: false
  use_physics_branch: false
  physics_dim: 96
  physics_quality_cues: false
  use_friction_set: false
  friction_set_entropy_expansion: 0.12
  friction_set_interval_mix: 0.8
  use_evidence_field: false
  evidence_dim: 96
  evidence_hidden_dim: 64
  evidence_patch_stride: 8
  evidence_contact_prior_strength: 1.0
  evidence_road_likelihood_prior_strength: 0.6
  evidence_entropy_expansion: 0.12
  evidence_interval_mix: 0.18
  evidence_risk_logit_mix: 0.1
  num_domains: 1
optim:
  epochs: 8
  lr: 8.0e-05
  weight_decay: 0.05
  grad_clip_norm: 5.0
  grad_accum_steps: 4
  amp: true
  early_stop_patience: 3
  early_stop_min_delta: 0.0005
  log_every_steps: 80
loss:
  task_weight: 1.0
  compatibility_weight: 0.0
  group_dro_weight: 0.0
  group_vrex_weight: 0.0
  risk_ordinal_weight: 0.2
  interval_weight: 0.1
  coverage_weight: 1.6
  endpoint_weight: 1.6
  target_width_weight: 0.3
  width_weight: 0.0
  coverage_margin: 0.04
  monotonic_weight: 0.05
  risk_mu_monotonic_weight: 0.08
  domain_weight: 0.0
  domain_grl_lambda: 0.0
  feature_coral_weight: 0.0
  risk_conditional_coral_weight: 0.0
  wetness_conditional_coral_weight: 0.0
  coral_min_samples_per_domain: 2
  evidence_risk_weight: 0.0
  evidence_interval_weight: 0.0
  evidence_endpoint_weight: 0.0
  evidence_width_weight: 0.0
  evidence_target_width_weight: 0.0
  evidence_attention_prior_weight: 0.0
  evidence_attention_smooth_weight: 0.0
  evidence_risk_consistency_weight: 0.0
  evidence_interval_consistency_weight: 0.0
  evidence_attention_region_weight: 0.0
  evidence_attention_pseudo_road_weight: 0.0
  coverage_risk_weight: 0.35
  coverage_wetness_weight: 0.25
  coverage_snow_weight: 0.25
  coverage_weight_max: 1.8
  wetness_ordinal_weight: 0.1
  evidence_pseudo_road_min_mass: 0.72
  evidence_pseudo_road_threshold: 0.35
  evidence_bottom_mass_target: 0.60
  evidence_center_bottom_mass_target: 0.24
  evidence_top_mass_max: 0.35
  aug_consistency_weight: 0.0
  aug_consistency_max_samples: 0
  aug_consistency_strength: 0.0
  aug_consistency_noise_std: 0.0
  aug_consistency_interval_weight: 0.0
  aug_consistency_attention_weight: 0.0
experiment_note: >
  FAST direct-visual-friction global ConvNeXt baseline on the Zhao et al.
  Extreme-Road image dataset. This uses the same weak friction/risk/interval
  labels and training budget as extreme_road_quality_physics_fast, but disables
  PhysicsTexture and EvidenceField for same-task fair comparison.
