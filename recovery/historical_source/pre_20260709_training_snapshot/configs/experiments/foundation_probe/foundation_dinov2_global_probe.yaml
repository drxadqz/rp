seed: 79
output_dir: D:\NMI_SPWFM_datasets\friction_affordance_outputs\foundation_probe\foundation_dinov2_global_probe
device: auto
data:
  train_manifests:
  - data/manifests_full/rscd_prepared_train.csv
  - data/manifests_full/roadsaw_train.csv
  - data/manifests_full/roadsc_train.csv
  val_manifests:
  - data/manifests_full/rscd_prepared_val.csv
  - data/manifests_full/roadsaw_val.csv
  - data/manifests_full/roadsc_val.csv
  test_manifests:
  - data/manifests_full/rscd_prepared_test.csv
  - data/manifests_full/roadsaw_test.csv
  - data/manifests_full/roadsc_test.csv
  image_size: 196
  batch_size: 2
  num_workers: 2
  prefetch_factor: 2
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
  max_train_samples_per_class: null
  max_val_samples_per_class: null
  max_test_samples_per_class: null
  balanced_sampling: true
  balanced_dataset_first: true
  balanced_group_columns:
  - dataset
  - class_label
  balanced_num_samples_per_epoch: 12000
  sample_seed: 79
  augmentation:
    random_resized_crop: true
    crop_scale:
    - 0.78
    - 1.0
    crop_ratio:
    - 0.88
    - 1.12
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.18
      hue: 0.035
    random_grayscale_p: 0.08
    gaussian_blur_p: 0.12
    blur_sigma:
    - 0.1
    - 1.2
    random_erasing_p: 0.06
    erase_scale:
    - 0.015
    - 0.07
model:
  backbone: timm:vit_small_patch14_dinov2
  embedding_dim: 384
  dropout: 0.3
  pretrained: true
  freeze_backbone: false
  use_physics_branch: false
  physics_dim: 96
  use_friction_set: false
  friction_set_entropy_expansion: 0.12
  friction_set_interval_mix: 0.8
  use_evidence_field: false
  evidence_dim: 96
  evidence_hidden_dim: 64
  evidence_patch_stride: 8
  evidence_contact_prior_strength: 1.0
  evidence_entropy_expansion: 0.08
  evidence_interval_mix: 0.2
  evidence_risk_logit_mix: 0.15
  num_domains: 3
optim:
  epochs: 8
  lr: 5.0e-05
  weight_decay: 0.05
  grad_clip_norm: 5.0
  grad_accum_steps: 16
  amp: true
  early_stop_patience: 3
  early_stop_min_delta: 0.0005
  log_every_steps: 100
loss:
  task_weight: 1.0
  compatibility_weight: 0.0
  group_dro_weight: 0.0
  group_vrex_weight: 0.0
  risk_ordinal_weight: 0.12
  interval_weight: 0.06
  coverage_weight: 1.0
  endpoint_weight: 1.0
  target_width_weight: 0.25
  width_weight: 0.0
  coverage_margin: 0.04
  monotonic_weight: 0.04
  risk_mu_monotonic_weight: 0.06
  domain_weight: 0.0
  domain_grl_lambda: 0.0
  feature_coral_weight: 0.0
  risk_conditional_coral_weight: 0.0
  wetness_conditional_coral_weight: 0.0
  wetness_ordinal_weight: 0.08
  coverage_risk_weight: 0.25
  coverage_wetness_weight: 0.2
  coverage_snow_weight: 0.15
  coverage_weight_max: 1.6
experiment_note: 'Feasibility probe only: DINOv2-small/timm global image-level baseline
  on the same public manifests as the quality FAF probe. Not final claim evidence.'
screen_parent_run: null
not_final_claim_evidence: true
