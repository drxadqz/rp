seed: 79
output_dir: D:\NMI_SPWFM_datasets\friction_affordance_outputs\fast_screen\screen_v14_lean_road_roi_safety
device: auto
data:
  train_manifests:
  - data/manifests_full/rscd_prepared_train.csv
  - data/manifests_full/roadsaw_train.csv
  - data/manifests_full/roadsc_train.csv
  val_manifests:
  - data/manifests_full/rscd_prepared_val.csv
  - data/manifests_full/roadsaw_val.csv
  - data/manifests_full/roadsc_val.csv
  test_manifests:
  - data/manifests_full/rscd_prepared_test.csv
  - data/manifests_full/roadsaw_test.csv
  - data/manifests_full/roadsc_test.csv
  image_size: 192
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  max_train_samples: null
  max_val_samples: 6000
  max_test_samples: 9000
  max_train_samples_per_class: 300
  max_val_samples_per_class: 80
  max_test_samples_per_class: 120
  balanced_sampling: true
  balanced_dataset_first: true
  balanced_group_columns:
  - dataset
  - class_label
  balanced_num_samples_per_epoch: 4800
  sample_seed: 79
  augmentation:
    random_resized_crop: true
    crop_scale:
    - 0.78
    - 1.0
    crop_ratio:
    - 0.88
    - 1.12
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.18
      hue: 0.035
    random_grayscale_p: 0.08
    gaussian_blur_p: 0.12
    blur_sigma:
    - 0.1
    - 1.2
    random_erasing_p: 0.06
    erase_scale:
    - 0.015
    - 0.07
    fourier_low_freq_jitter_p: 0.3
    fourier_beta: 0.08
    fourier_strength:
    - 0.72
    - 1.28
  balanced_weight_overrides:
  - where:
      wetness_label: very_wet
    multiplier: 1.8
  - where:
      wetness_label: wet
    multiplier: 1.4
  - where:
      wetness_label: damp
    multiplier: 1.2
  max_train_samples_per_dataset: null
  max_val_samples_per_dataset: null
  max_test_samples_per_dataset: null
model:
  backbone: convnext_tiny
  embedding_dim: 768
  dropout: 0.3
  pretrained: true
  freeze_backbone: false
  use_physics_branch: true
  physics_dim: 96
  use_friction_set: false
  friction_set_entropy_expansion: 0.12
  friction_set_interval_mix: 0.8
  use_evidence_field: true
  evidence_dim: 96
  evidence_hidden_dim: 64
  evidence_patch_stride: 8
  evidence_contact_prior_strength: 1.0
  evidence_entropy_expansion: 0.16
  evidence_interval_mix: 0.22
  evidence_risk_logit_mix: 0.12
  num_domains: 3
  evidence_road_likelihood_prior_strength: 0.75
optim:
  epochs: 4
  lr: 8.0e-05
  weight_decay: 0.05
  grad_clip_norm: 5.0
  grad_accum_steps: 4
  amp: true
  early_stop_patience: 2
  early_stop_min_delta: 0.0005
  log_every_steps: 50
loss:
  task_weight: 0.58
  compatibility_weight: 0.0
  group_dro_weight: 0.0
  group_vrex_weight: 0.0
  group_dro_temperature: 0.05
  risk_ordinal_weight: 0.2
  interval_weight: 0.09
  coverage_weight: 1.8
  endpoint_weight: 1.8
  target_width_weight: 0.35
  width_weight: 0.0
  coverage_margin: 0.04
  monotonic_weight: 0.05
  risk_mu_monotonic_weight: 0.08
  domain_weight: 0.0
  domain_grl_lambda: 0.0
  feature_coral_weight: 0.0
  risk_conditional_coral_weight: 0.01
  coral_min_samples_per_domain: 2
  evidence_risk_weight: 0.2
  evidence_interval_weight: 0.06
  evidence_endpoint_weight: 0.55
  evidence_width_weight: 0.04
  evidence_target_width_weight: 0.45
  evidence_attention_prior_weight: 0.01
  evidence_attention_smooth_weight: 0.01
  evidence_risk_consistency_weight: 0.05
  evidence_interval_consistency_weight: 0.05
  evidence_attention_region_weight: 0.05
  evidence_attention_pseudo_road_weight: 0.04
  coverage_risk_weight: 0.35
  coverage_wetness_weight: 0.25
  coverage_snow_weight: 0.2
  coverage_weight_max: 1.85
  wetness_conditional_coral_weight: 0.015
  wetness_ordinal_weight: 0.1
