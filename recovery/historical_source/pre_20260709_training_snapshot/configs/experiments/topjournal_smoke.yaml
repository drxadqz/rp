seed: 53
output_dir: outputs/topjournal_smoke
device: auto

data:
  train_manifests:
    - data/manifests/rscd_prepared_train.csv
    - data/manifests/roadsaw_train.csv
    - data/manifests/roadsc_train.csv
  val_manifests:
    - data/manifests/rscd_prepared_val.csv
    - data/manifests/roadsaw_val.csv
    - data/manifests/roadsc_val.csv
  test_manifests:
    - data/manifests/rscd_prepared_test.csv
    - data/manifests/roadsaw_test.csv
    - data/manifests/roadsc_test.csv
  image_size: 160
  batch_size: 48
  num_workers: 0
  max_train_samples: 768
  max_val_samples: 256
  max_test_samples: 256
  sample_seed: 53

model:
  backbone: resnet18
  embedding_dim: 512
  dropout: 0.2
  pretrained: true
  freeze_backbone: true
  use_physics_branch: true
  physics_dim: 64
  num_domains: 3

optim:
  epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 5.0
  amp: true
  early_stop_patience: 1
  early_stop_min_delta: 0.001

loss:
  task_weight: 1.0
  risk_ordinal_weight: 0.2
  interval_weight: 0.35
  coverage_weight: 0.75
  width_weight: 0.02
  coverage_margin: 0.0
  monotonic_weight: 0.05
  risk_mu_monotonic_weight: 0.05
  domain_weight: 0.02
  domain_grl_lambda: 0.04
