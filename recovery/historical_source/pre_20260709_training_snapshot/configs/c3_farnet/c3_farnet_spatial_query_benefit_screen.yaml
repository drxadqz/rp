seed: 151
output_dir: E:/perception/friction_affordance_runs/c3_farnet_spatial_query_benefit_screen_20260704

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  embedding_dim: 768
  pretrained: false
  dropout: 0.2
  token_dim: 256
  pair_rank: 8
  triple_rank: 8
  head_type: hardpair_benefit_gated_margin_calibrated
  use_spatial_factor_queries: true
  spatial_factor_query_map_dim: 768
  spatial_factor_query_heads: 4
  spatial_factor_query_scale: 0.22
  hardpair_margin_scale: 1.50
  hardpair_gate_margin: 1.45
  hardpair_gate_temperature: 3.5
  hardpair_error_gate_bias_init: -3.4
  hardpair_error_gate_floor: 0.05
  hardpair_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
  use_physics_branch: true
  physics_dim: 96
  physics_quality_cues: true
  physics_quality_region_cues: false
  use_semantic_physics_attention_branch: true
  semantic_physics_attention_dim: 64
  use_local_physics_field_branch: true
  local_physics_field_dim: 64
  local_physics_field_scale: 0.08
  use_dry_concrete_roughness_vor_residual: true
  dry_concrete_roughness_hidden_dim: 48
  dry_concrete_roughness_scale: 0.12
  dry_concrete_roughness_gate_threshold: 0.12
  dry_concrete_roughness_gate_temperature: 14.0

loss:
  factor_weight: 0.0
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.0
  tournament_weight: 0.0
  counterfactual_weight: 0.0
  reliability_weight: 0.0
  counterfactual_margin: 1.0
  supervise_none: false
  focus_ce_extra_weight: 0.15
  focus_ce_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
  hardpair_binary_loss_weight: 0.04
  hardpair_margin_loss_weight: 0.07
  hardpair_margin_target: 0.72
  hardpair_margin_teacher_pair_only: true
  hardpair_margin_direction_weight: 0.04
  hardpair_margin_keep_weight: 0.025
  anchor_error_gate_weight: 0.20
  anchor_error_gate_pos_weight: 55.0
  anchor_error_gate_pair_error_only: true
  anchor_consistency_weight: 0.65
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.24
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.55
  anchor_consistency_protect_confidence: 0.70
  anchor_consistency_protect_margin: 0.18
  anchor_no_flip_weight: 0.35
  anchor_no_flip_nonfocus_only: true
  anchor_consistency_exempt_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe

train:
  resume_from: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/screen_dry_concrete_vor_residual_scale012_lr1e3_s8k_from_anchor/best.pt
  teacher_checkpoint: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/screen_dry_concrete_vor_residual_scale012_lr1e3_s8k_from_anchor/best.pt
  teacher_backbone: convnext_tiny
  teacher_head_type: linear
  trainable_prefixes:
    - decoder.spatial
    - pairwise_hardpair_margin_heads
    - pairwise_hardpair_error_gates
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 2
  prefetch_factor: 2
  lr: 0.00008
  weight_decay: 0.002
  epochs: 2
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 8000
  grad_clip_norm: 5.0
  log_every_steps: 125

eval:
  batch_size: 16
  max_val_samples_per_class: 120
  max_test_samples_per_class: 120
