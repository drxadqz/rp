extends: c3_farnet_screen_s150_s96_local_dct_factor_early_20260717.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s151_s96_local_dct_selective_noharm_20260717

# S151: selective/no-harm revision of S150.
#
# S150 proved early LocalDCT writes can move predictions, but the same write
# damaged concrete wet/water film classes. S151 keeps the non-RSPNet local DCT
# mechanism but only opens writes on asphalt-like and dry-concrete texture
# regimes, while suppressing concrete + wet/water film regions.

model:
  backbone: convnext_tiny_gate_calibrated_local_dct_selective_asphalt_dry_concrete_stem

loss:
  focus_ce_extra_weight: 0.22
  focus_ce_classes:
    - water_asphalt_slight
    - water_asphalt_severe
    - wet_asphalt_smooth
    - wet_asphalt_slight
    - wet_asphalt_severe
    - dry_concrete_slight
    - dry_concrete_severe
  feature_value_boundary_pairwise_loss_weight: 0.32
  feature_value_boundary_pairwise_loss_pairs:
    - water_asphalt_slight|water_asphalt_severe
    - wet_asphalt_slight|wet_asphalt_severe
    - dry_concrete_slight|dry_concrete_severe
  feature_value_boundary_pairwise_pair_weights:
    water_asphalt_slight|water_asphalt_severe: 2.6
    wet_asphalt_slight|wet_asphalt_severe: 2.0
    dry_concrete_slight|dry_concrete_severe: 2.0
  value_guided_hardpair_margin_weight: 0.052
  value_guided_hardpair_margin_pairs:
    - water_asphalt_slight|water_asphalt_severe
    - wet_asphalt_slight|wet_asphalt_severe
    - dry_concrete_slight|dry_concrete_severe
  value_guided_hardpair_margin_pair_weights:
    water_asphalt_slight|water_asphalt_severe: 2.4
    wet_asphalt_slight|wet_asphalt_severe: 1.8
    dry_concrete_slight|dry_concrete_severe: 1.8
  anchor_consistency_weight: 0.42
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_protect_weight: 0.72
  anchor_no_flip_weight: 0.56
  anchor_no_flip_nonfocus_only: true
  anchor_nonregression_weight: 0.32
  anchor_nonregression_focus_weight: 0.020

train:
  trainable_prefixes:
    - backbone.local_dct_factor_adapters
  evaluate_initial: true
  lr: 0.00013
  factor_graph_pair_sampling_seed: 15117
  factor_graph_pair_sampling_focus_pairs:
    - water_asphalt_slight|water_asphalt_severe
    - wet_asphalt_slight|wet_asphalt_severe
    - dry_concrete_slight|dry_concrete_severe
  factor_graph_pair_sampling_focus_pairs_only: false
  factor_graph_pair_sampling_wet_concrete_focus_scale: 4.0
  factor_graph_pair_sampling_roughness_focus_scale: 4.5
  factor_graph_pair_sampling_wet_water_focus_scale: 2.0
