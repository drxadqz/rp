extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_road_cortex_s22_20260709

model:
  # S22: first-principles self-designed RSCD backbone.
  # RoadCortexNet is not ConvNeXt/RSPNet/RoadFormer/timm. It builds material,
  # wet-film, roughness, and coupling streams from RSCD physical evidence, then
  # updates a friction/material/roughness state through every stage.
  backbone: road_cortex_tiny
  pretrained: false

loss:
  # A from-scratch backbone should learn from labels first, with teacher
  # consistency used only as a light non-regression prior for stable classes.
  anchor_consistency_weight: 0.22
  anchor_consistency_focus_weight: 0.008
  anchor_no_flip_weight: 0.08
  anchor_error_gate_weight: 0.05
  focus_ce_extra_weight: 0.25

train:
  # Do not load ConvNeXt weights into a self-designed backbone and do not freeze
  # to old ConvNeXt prefixes. This is a fair full-manifest training run.
  resume_from:
  trainable_prefixes:
  evaluate_initial: false
  lr: 0.00012
  weight_decay: 0.003
  epochs: 1
  batch_size: 8
  grad_accum_steps: 2
  samples_per_epoch: 0
  amp: true
  balanced_sampling: true
  log_every_steps: 2000
