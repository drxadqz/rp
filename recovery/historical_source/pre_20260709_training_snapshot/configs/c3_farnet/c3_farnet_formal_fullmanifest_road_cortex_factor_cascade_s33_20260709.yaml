extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_road_cortex_factor_cascade_s33_20260709

model:
  # S33: self-designed causal factor-cascade backbone.
  # Each block first estimates material, then estimates friction conditioned on
  # material, then estimates roughness conditioned on both material and friction.
  # This implements P(m) P(f|m) P(r|f,m) inside the backbone rather than adding
  # late auxiliary heads.
  backbone: road_cortex_factor_cascade_tiny
  pretrained: false

loss:
  anchor_consistency_weight: 0.23
  anchor_consistency_focus_weight: 0.008
  anchor_no_flip_weight: 0.08
  anchor_error_gate_weight: 0.05
  focus_ce_extra_weight: 0.31

train:
  resume_from:
  trainable_prefixes:
  evaluate_initial: false
  lr: 0.00010
  weight_decay: 0.0035
  epochs: 1
  batch_size: 8
  grad_accum_steps: 2
  samples_per_epoch: 0
  amp: true
  balanced_sampling: true
  log_every_steps: 2000
