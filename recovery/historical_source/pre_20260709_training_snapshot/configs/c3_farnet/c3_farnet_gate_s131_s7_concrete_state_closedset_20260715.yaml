extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_gate_s131_s7_concrete_state_closedset_20260715

# S131: concrete-state closed-set roughness redistributor.
# Targeted RSCD factors:
# - friction: dry, wet, and water are handled by separate closed sets;
# - material: concrete only, so asphalt/gravel/mud/snow classes are protected;
# - roughness: smooth/slight/severe are redistributed with graph locality;
# - coupling: dry+concrete, wet+concrete, and water+concrete use separate
#   residual experts because the visible roughness cue is physically different
#   for dry texture, thin wet film, and standing-water texture erasure.

model:
  use_closed_set_factor_redistributor: true
  closed_set_factor_redistributor_sets:
    - dry_concrete_smooth|dry_concrete_slight|dry_concrete_severe
    - wet_concrete_smooth|wet_concrete_slight|wet_concrete_severe
    - water_concrete_smooth|water_concrete_slight|water_concrete_severe
  closed_set_factor_redistributor_hidden_dim: 96
  closed_set_factor_redistributor_scale: 0.110
  closed_set_factor_redistributor_gate_floor: 0.025
  closed_set_factor_redistributor_mass_threshold: 0.120
  closed_set_factor_redistributor_margin_threshold: 0.380
  closed_set_factor_redistributor_temperature: 8.5
  closed_set_factor_redistributor_dropout: 0.02
  closed_set_factor_redistributor_gate_bias_init: -2.0
  closed_set_factor_redistributor_use_graph_locality_guard: true
  closed_set_factor_redistributor_graph_max_distance: 1.0
  closed_set_factor_redistributor_graph_guard_floor: 0.08
  closed_set_factor_redistributor_graph_guard_temperature: 12.0

loss:
  focus_ce_extra_weight: 0.24
  focus_ce_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_smooth
    - wet_concrete_slight
    - wet_concrete_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
  anchor_consistency_weight: 0.50
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.60
  anchor_consistency_protect_confidence: 0.74
  anchor_consistency_protect_margin: 0.24
  anchor_no_flip_weight: 0.46
  anchor_no_flip_nonfocus_only: true
  anchor_nonregression_weight: 0.28
  anchor_nonregression_focus_weight: 0.014
  anchor_nonregression_margin: 0.012
  anchor_nonregression_confidence: 0.70
  anchor_nonregression_teacher_margin: 0.12
  anchor_error_gate_weight: 0.0
  anchor_consistency_exempt_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_smooth
    - wet_concrete_slight
    - wet_concrete_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe

train:
  resume_from: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709/best_checkpoint.pth
  teacher_checkpoint: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  teacher_preserve_hardpair_focus: true
  trainable_prefixes:
    - closed_set_factor_redistributor
  evaluate_initial: true
  lr: 0.00011
  weight_decay: 0.0012
  epochs: 1
  batch_size: 4
  grad_accum_steps: 4
  num_workers: 2
  prefetch_factor: 2
  amp: true
  augmentation: true
  balanced_sampling: true
  factor_graph_pair_sampling: true
  factor_graph_pair_sampling_seed: 13107
  factor_graph_pair_sampling_pair_slots: 2
  factor_graph_pair_sampling_positive_slots: 0
  factor_graph_pair_sampling_wet_concrete_focus_scale: 4.0
  factor_graph_pair_sampling_roughness_focus_scale: 5.5
  factor_graph_pair_sampling_wet_water_focus_scale: 2.0
  max_train_samples_per_class: 250
  samples_per_epoch: 6750
  grad_clip_norm: 2.5
  log_every_steps: 125

eval:
  batch_size: 8
  max_val_samples_per_class: 250
  max_test_samples_per_class: 250
