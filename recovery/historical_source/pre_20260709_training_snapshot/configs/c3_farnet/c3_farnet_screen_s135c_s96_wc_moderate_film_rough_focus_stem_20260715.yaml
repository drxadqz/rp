# S135c: tighter water-concrete weak-boundary focus with contrast visibility.
# Val-only mechanism audit showed generic film-boundary/topology responses also
# fire on wet/water asphalt, snow, and gravel. Stable S7/S96 cue synthesis then
# showed water_concrete_slight vs water_concrete_severe is best separated by
# local gray contrast, low-brightness film quantiles, and saturation variance.
# The forward gate is therefore restricted to the RSCD weak boundary pattern:
#   concrete candidate + moderate water film + moderate roughness + weak film
#   boundary + signed occluded-film-vs-visible-texture evidence + contrast
#   visibility under water film.

