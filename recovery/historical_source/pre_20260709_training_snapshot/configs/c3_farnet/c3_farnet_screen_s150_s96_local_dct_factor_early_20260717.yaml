extends: c3_farnet_screen_s96_wc_pair_relative_boundary_20260712.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s150_s96_local_dct_factor_early_20260717

# S150: non-RSPNet frequency-domain early mechanism.
#
# It borrows the CV idea that useful visual signals are distributed across
# spectral bands, but avoids RSPNet's wavelet/WTConv/star-op design. The new
# backbone uses fixed local DCT probes as a coordinate system for low-frequency
# film/smoothness, mid-frequency material texture, high-frequency roughness,
# and oriented marking/shadow artifacts. RSCD physical evidence then routes
# those branches before the original S96 tensor-coupling block.
#
# Target factors:
#   friction: dry/wet/water film evidence
#   material: asphalt/concrete spectral texture
#   roughness: smooth/slight/severe spectral slope
#   coupling: wet/water + concrete + slight/severe hard boundaries

model:
  backbone: convnext_tiny_gate_calibrated_local_dct_factor_concrete_film_rough_stem
  pretrained: false
  head_type: hardpair_error_gated_calibrated
  use_source_reliable_boundary_router: true
  expose_hardpair_pair_value_evidence: true
  use_physics_texture_stem_adapter: true
  use_scale_space_roughness_stem_adapter: true
  use_pair_value_stem_conditioner: true
  use_feature_value_boundary_corrector: true

loss:
  focus_ce_extra_weight: 0.24
  focus_ce_classes:
    - water_concrete_slight
    - water_concrete_severe
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_slight
    - wet_concrete_severe
  feature_value_boundary_pairwise_loss_weight: 0.36
  feature_value_boundary_pairwise_loss_pairs:
    - water_concrete_slight|water_concrete_severe
    - dry_concrete_slight|dry_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
  feature_value_boundary_pairwise_pair_weights:
    water_concrete_slight|water_concrete_severe: 3.5
    dry_concrete_slight|dry_concrete_severe: 2.0
    wet_concrete_slight|wet_concrete_severe: 2.0
  value_guided_hardpair_margin_weight: 0.060
  value_guided_hardpair_margin_pairs:
    - water_concrete_slight|water_concrete_severe
    - dry_concrete_slight|dry_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
  value_guided_hardpair_margin_pair_weights:
    water_concrete_slight|water_concrete_severe: 3.0
    dry_concrete_slight|dry_concrete_severe: 1.8
    wet_concrete_slight|wet_concrete_severe: 1.8
  anchor_consistency_weight: 0.38
  anchor_consistency_focus_weight: 0.012
  anchor_consistency_protect_weight: 0.68
  anchor_no_flip_weight: 0.50
  anchor_no_flip_nonfocus_only: true
  anchor_nonregression_weight: 0.30
  anchor_nonregression_focus_weight: 0.024

train:
  resume_from: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s96_wc_pair_relative_boundary_20260712/best_checkpoint.pth
  teacher_checkpoint: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s96_wc_pair_relative_boundary_20260712/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  teacher_preserve_hardpair_focus: true
  trainable_prefixes:
    - backbone.local_dct_factor_adapters
  evaluate_initial: true
  lr: 0.00014
  weight_decay: 0.0010
  epochs: 1
  batch_size: 4
  grad_accum_steps: 4
  num_workers: 2
  prefetch_factor: 2
  amp: true
  augmentation: true
  factor_graph_pair_sampling: true
  factor_graph_pair_sampling_seed: 15017
  factor_graph_pair_sampling_pair_slots: 2
  factor_graph_pair_sampling_positive_slots: 0
  factor_graph_pair_sampling_focus_pairs:
    - water_concrete_slight|water_concrete_severe
    - dry_concrete_slight|dry_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
  factor_graph_pair_sampling_focus_pairs_only: false
  factor_graph_pair_sampling_wet_concrete_focus_scale: 12.0
  factor_graph_pair_sampling_roughness_focus_scale: 5.0
  factor_graph_pair_sampling_wet_water_focus_scale: 2.2
  max_train_samples_per_class: 1000
  samples_per_epoch: 27000
  grad_clip_norm: 1.8
  log_every_steps: 500

eval:
  batch_size: 16
  max_val_samples_per_class: 250
  max_test_samples_per_class: 250
