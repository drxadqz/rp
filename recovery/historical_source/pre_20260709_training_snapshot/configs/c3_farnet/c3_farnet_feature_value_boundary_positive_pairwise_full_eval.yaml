    - dry_concrete_severe|dry_concrete_slight
    - wet_concrete_severe|wet_concrete_slight
    - water_asphalt_severe|water_asphalt_slight

loss:
  factor_weight: 0.0
  tournament_weight: 0.0
  counterfactual_weight: 0.0
  reliability_weight: 0.0

