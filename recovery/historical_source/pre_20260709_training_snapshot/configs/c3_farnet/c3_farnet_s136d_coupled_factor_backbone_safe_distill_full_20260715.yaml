seed: 136
output_dir: E:/perception_outputs/rscd_surface_classification/s136d_coupled_factor_backbone_safe_distill_full_20260715

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  stem_dim: 48
  stage_dims: [96, 192, 384]
  dropout: 0.15
  coupling_gate_mode: learned

loss:
  class_weight: 1.0
  factor_weight: 0.25
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.4
  coupling_gate_weight: 0.06
  anchor_consistency_weight: 0.42
  anchor_consistency_focus_weight: 0.008
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.36
  anchor_consistency_protect_confidence: 0.70
  anchor_consistency_protect_margin: 0.18
  anchor_no_flip_weight: 0.12
  anchor_no_flip_nonfocus_only: true
  anchor_consistency_exempt_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
    - dry_concrete_slight
  anchor_nonregression_weight: 0.08
  anchor_nonregression_focus_weight: 0.025
  anchor_nonregression_margin: 0.02
  anchor_nonregression_confidence: 0.70
  anchor_nonregression_teacher_margin: 0.18
  anchor_nonregression_squared: true
  anchor_nonregression_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
    - dry_concrete_slight
  pareto_safe_distill_weight: 0.06
  pareto_safe_margin_weight: 0.02
  pareto_safe_hardpair_margin_weight: 0.02
  pareto_safe_temperature: 2.0
  pareto_safe_confidence: 0.70
  pareto_safe_teacher_margin: 0.18
  pareto_safe_margin_tolerance: 0.02
  safe_distill_warmup_epochs: 0
  safe_distill_ramp_epochs: 0
  safe_distill_initial_scale: 1.0
  safe_distill_final_scale: 1.0
  pareto_safe_focus_protect_scale: 0.20
  pareto_safe_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
    - dry_concrete_slight
  pareto_safe_hardpair_pairs:
    - water_concrete_slight|wet_concrete_slight
    - water_concrete_severe|wet_concrete_severe
    - water_concrete_slight|water_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
    - dry_concrete_smooth|dry_concrete_slight

train:
  resume_from: E:/perception_outputs/rscd_surface_classification/s136d_coupled_factor_backbone_safe_distill_screen_20260715/best_checkpoint.pth
  batch_size: 16
  grad_accum_steps: 1
  num_workers: 2
  prefetch_factor: 2
  lr: 0.00012
  weight_decay: 0.01
  epochs: 10
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 0
  grad_clip_norm: 5.0
  log_every_steps: 2000
  teacher_logits_cache: E:/perception_outputs/rscd_surface_classification/s136d_coupled_factor_backbone_safe_distill_full_20260715/s7_teacher_logits_train_full.pt
  teacher_logits_cache_strict: true
  evaluate_initial: true
  resume_step_checkpoint: true
  save_step_checkpoint_every: 2000

eval:
  batch_size: 32
  max_val_samples_per_class:
  max_test_samples_per_class:
