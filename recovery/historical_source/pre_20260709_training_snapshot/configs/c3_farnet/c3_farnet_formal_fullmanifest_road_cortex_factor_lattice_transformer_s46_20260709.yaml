extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_road_cortex_factor_lattice_transformer_s46_20260709

model:
  # S46: self-designed factor-lattice Transformer backbone.
  # It uses RSCD factor and coupling tokens with pairwise tournament comparison,
  # then writes the token evidence back into local road texture fields.
  backbone: road_cortex_factor_lattice_transformer_tiny
  pretrained: false

loss:
  anchor_consistency_weight: 0.23
  anchor_consistency_focus_weight: 0.008
  anchor_no_flip_weight: 0.08
  anchor_error_gate_weight: 0.05
  focus_ce_extra_weight: 0.30

train:
  resume_from:
  trainable_prefixes:
  evaluate_initial: false
  lr: 0.00010
  weight_decay: 0.0035
  epochs: 1
  batch_size: 8
  grad_accum_steps: 2
  samples_per_epoch: 0
  amp: true
  balanced_sampling: true
  log_every_steps: 2000
