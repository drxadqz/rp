  # objective but slightly emphasize concrete slight/severe separation.
  family_mechanism_router_weight: 0.242
  family_router_target_margin_weight: 0.075
  family_router_target_margin: 0.252
  family_router_concrete_slight_weight: 1.28
  family_router_concrete_severe_weight: 1.16
