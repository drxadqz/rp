model:
  # S20: S19 plus morphology scale-space roughness evidence.
  # Opening/closing top-hat and granulometric scale balance are injected before
  # early tensor coupling, so the model learns smooth/slight/severe roughness
  # from aggregate/pit size instead of relying only on generic texture contrast.
  backbone: convnext_tiny_family_router_morphology_scale_concrete_film_stem

loss:
