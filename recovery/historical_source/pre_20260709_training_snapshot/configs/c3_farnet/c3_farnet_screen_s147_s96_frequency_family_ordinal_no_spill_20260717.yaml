extends: c3_farnet_screen_s146_s96_frequency_physics_gate_current_20260717.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s147_s96_frequency_family_ordinal_no_spill_20260717

# S147: non-RSPNet spectral ordinal no-spill route.
#
# S146 proved that a weak early frequency residual is safe but too conservative.
# S147 keeps the same non-wavelet frequency stem and adds a family-wise ordinal
# no-spill redistributor. It observes the frequency-conditioned stage-1/stage-3
# maps plus PhysicsTexture boundary evidence, then redistributes probability
# only inside the same friction-material roughness triplet:
#
#   smooth <-> slight <-> severe
#
# This targets the RSCD failure mode where film/water suppresses roughness
# texture. It never moves probability across friction or material families, so
# gains on water/dry concrete roughness are less likely to damage easy classes.

model:
  backbone: convnext_tiny_gate_calibrated_frequency_physics_concrete_film_rough_stem
  pretrained: false
  head_type: hardpair_error_gated_calibrated
  use_source_reliable_boundary_router: true
  expose_hardpair_pair_value_evidence: true
  use_physics_texture_stem_adapter: true
  use_scale_space_roughness_stem_adapter: true
  use_pair_value_stem_conditioner: true
  use_feature_value_boundary_corrector: true
  use_backbone_family_ordinal_no_spill_adapter: true
  backbone_family_ordinal_no_spill_families:
    - water_concrete
    - dry_concrete
    - water_asphalt
  backbone_family_ordinal_no_spill_hidden_dim: 96
  backbone_family_ordinal_no_spill_family_embed_dim: 12
  backbone_family_ordinal_no_spill_scale: 0.18
  backbone_family_ordinal_no_spill_gate_threshold: 0.040
  backbone_family_ordinal_no_spill_gate_temperature: 12.0
  backbone_family_ordinal_no_spill_dropout: 0.02

loss:
  focus_ce_extra_weight: 0.26
  focus_ce_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - water_asphalt_smooth
    - water_asphalt_slight
    - water_asphalt_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
  feature_value_boundary_pairwise_loss_weight: 0.34
  feature_value_boundary_pairwise_loss_pairs:
    - water_concrete_smooth|water_concrete_slight
    - water_concrete_slight|water_concrete_severe
    - dry_concrete_smooth|dry_concrete_slight
    - dry_concrete_slight|dry_concrete_severe
    - water_asphalt_smooth|water_asphalt_slight
    - water_asphalt_slight|water_asphalt_severe
  feature_value_boundary_pairwise_pair_weights:
    water_concrete_slight|water_concrete_severe: 2.8
    water_concrete_smooth|water_concrete_slight: 1.6
    dry_concrete_slight|dry_concrete_severe: 1.7
    dry_concrete_smooth|dry_concrete_slight: 1.4
    water_asphalt_slight|water_asphalt_severe: 1.5
    water_asphalt_smooth|water_asphalt_slight: 1.2
  value_guided_hardpair_margin_weight: 0.055
  value_guided_hardpair_margin_pairs:
    - water_concrete_smooth|water_concrete_slight
    - water_concrete_slight|water_concrete_severe
    - dry_concrete_smooth|dry_concrete_slight
    - dry_concrete_slight|dry_concrete_severe
    - water_asphalt_smooth|water_asphalt_slight
    - water_asphalt_slight|water_asphalt_severe
  value_guided_hardpair_margin_pair_weights:
    water_concrete_slight|water_concrete_severe: 2.6
    water_concrete_smooth|water_concrete_slight: 1.5
    dry_concrete_slight|dry_concrete_severe: 1.6
    dry_concrete_smooth|dry_concrete_slight: 1.3
    water_asphalt_slight|water_asphalt_severe: 1.4
    water_asphalt_smooth|water_asphalt_slight: 1.1
  value_guided_hardpair_margin_target: 0.42
  value_guided_hardpair_margin_low_margin_threshold: 1.05
  value_guided_hardpair_margin_min_weight: 0.22
  anchor_consistency_weight: 0.40
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.60
  anchor_consistency_protect_confidence: 0.74
  anchor_consistency_protect_margin: 0.24
  anchor_no_flip_weight: 0.42
  anchor_no_flip_nonfocus_only: true
  anchor_error_gate_weight: 0.0
  anchor_consistency_exempt_classes:
    - dry_concrete_slight
    - water_asphalt_slight
    - water_asphalt_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
  anchor_nonregression_weight: 0.24
  anchor_nonregression_focus_weight: 0.030
  anchor_nonregression_margin: 0.014
  anchor_nonregression_confidence: 0.70
  anchor_nonregression_teacher_margin: 0.12

train:
  resume_from: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s96_wc_pair_relative_boundary_20260712/best_checkpoint.pth
  teacher_checkpoint: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s96_wc_pair_relative_boundary_20260712/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  teacher_preserve_hardpair_focus: true
  trainable_prefixes:
    - backbone.frequency_physics_stem_adapters
    - backbone_family_ordinal_no_spill_adapter
  evaluate_initial: true
  lr: 0.00012
  weight_decay: 0.0010
  epochs: 1
  batch_size: 4
  grad_accum_steps: 4
  num_workers: 2
  prefetch_factor: 2
  amp: true
  augmentation: true
  factor_graph_pair_sampling: true
  factor_graph_pair_sampling_seed: 14717
  factor_graph_pair_sampling_pair_slots: 2
  factor_graph_pair_sampling_positive_slots: 0
  factor_graph_pair_sampling_wet_concrete_focus_scale: 10.0
  factor_graph_pair_sampling_roughness_focus_scale: 4.5
  factor_graph_pair_sampling_wet_water_focus_scale: 2.2
  max_train_samples_per_class: 1000
  samples_per_epoch: 27000
  grad_clip_norm: 2.0
  log_every_steps: 500

eval:
  batch_size: 16
  max_val_samples_per_class: 250
  max_test_samples_per_class: 250
