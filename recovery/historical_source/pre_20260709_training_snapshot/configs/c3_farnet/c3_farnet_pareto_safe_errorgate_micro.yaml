seed: 107
output_dir: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_pareto_safe_errorgate_micro_20260706

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  name: c3_farnet
  backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  embedding_dim: 768
  pretrained: false
  dropout: 0.2
  token_dim: 256
  pair_rank: 8
  triple_rank: 8
  head_type: hardpair_error_gated_calibrated
  hardpair_correction_scale: 0.11
  hardpair_gate_margin: 1.05
  hardpair_gate_temperature: 4.5
  hardpair_error_gate_bias_init: -4.2
  hardpair_error_gate_floor: 0.0
  hardpair_physics_gate: pair_value_evidence
  hardpair_physics_gate_floor: 0.0
  hardpair_physics_gate_power: 1.0
  hardpair_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
    - water_asphalt_slight
    - dry_concrete_slight
  hardpair_pair_scales:
    water_concrete_slight|water_concrete_severe: 1.35
    wet_concrete_slight|wet_concrete_severe: 1.20
    water_concrete_slight|wet_concrete_slight: 1.10
    water_concrete_severe|wet_concrete_severe: 1.05
    dry_concrete_slight|dry_concrete_severe: 1.10
  hardpair_sample_protect_classes:
    - wet_asphalt_severe
    - water_asphalt_severe
    - dry_asphalt_smooth
    - dry_gravel
    - wet_mud
  hardpair_sample_protect_threshold: 0.10
  hardpair_sample_protect_temperature: 28.0
  use_hardpair_value_signed_adapter: true
  hardpair_value_adapter_pairs:
    - water_concrete_slight|water_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
    - water_concrete_slight|wet_concrete_slight
    - water_concrete_severe|wet_concrete_severe
    - dry_concrete_slight|dry_concrete_severe
  hardpair_value_adapter_scale: 0.055
  hardpair_value_adapter_gate_floor: 0.0
  hardpair_value_adapter_value_aug_std: 0.010
  hardpair_value_adapter_dropout: 0.04
  use_hardpair_value_rough_tail_guard: true
  hardpair_value_rough_tail_guard_pairs:
    - water_concrete_slight|water_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
  hardpair_value_rough_tail_guard_threshold: 0.50
  hardpair_value_rough_tail_guard_temperature: 10.0
  hardpair_value_rough_tail_guard_strength: 0.75
  use_physics_branch: true
  physics_dim: 96
  physics_quality_cues: true
  physics_quality_region_cues: false
  boundary_use_physics_feature: true
  use_semantic_physics_attention_branch: true
  semantic_physics_attention_dim: 64
  use_local_physics_field_branch: true
  local_physics_field_dim: 64
  local_physics_field_scale: 0.08
  use_dry_concrete_roughness_vor_residual: true
  dry_concrete_roughness_hidden_dim: 48
  dry_concrete_roughness_scale: 0.12
  dry_concrete_roughness_gate_threshold: 0.12
  dry_concrete_roughness_gate_temperature: 14.0
  roughness_reliability_use_coupling_context: true
  expose_hardpair_pair_value_evidence: true

loss:
  use_factor_ce: false
  use_tournament: false
  use_counterfactual: false
  use_reliability: false
  factor_weight: 0.0
  tournament_weight: 0.0
  counterfactual_weight: 0.0
  reliability_weight: 0.0
  supervise_none: false
  focus_ce_extra_weight: 0.22
  focus_ce_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
