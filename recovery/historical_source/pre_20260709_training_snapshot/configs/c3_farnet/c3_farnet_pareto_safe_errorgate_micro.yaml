    - dry_concrete_slight
  anchor_consistency_weight: 0.34
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.22
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.32
  anchor_consistency_protect_confidence: 0.72
  anchor_consistency_protect_margin: 0.20
  anchor_no_flip_weight: 0.18
  anchor_no_flip_nonfocus_only: true
  anchor_error_gate_weight: 0.11
  anchor_error_gate_pos_weight: 10.0
  anchor_error_gate_pair_error_only: true
  hardpair_value_pairwise_loss_weight: 0.05
  hardpair_value_pairwise_loss_pairs:
    - water_concrete_slight|water_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
    - water_concrete_slight|wet_concrete_slight
    - water_concrete_severe|wet_concrete_severe
    - dry_concrete_slight|dry_concrete_severe
  pareto_safe_distill_weight: 0.28
