  pareto_safe_teacher_margin: 0.16
  pareto_safe_margin_tolerance: 0.025
  pareto_safe_focus_protect_scale: 0.20
  pareto_safe_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
    - water_asphalt_slight
    - dry_concrete_slight
  pareto_safe_hardpair_pairs:
    - water_concrete_slight|water_concrete_severe
    - wet_concrete_slight|wet_concrete_severe
    - water_concrete_slight|wet_concrete_slight
    - water_concrete_severe|wet_concrete_severe
    - dry_concrete_slight|dry_concrete_severe

train:
  resume_from: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_errorgate_paircal_screen_20260703/best_checkpoint.pth
  teacher_checkpoint: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_errorgate_paircal_screen_20260703/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  trainable_prefixes:
    - backbone.gate_calibrated_tensor_coupling_banks
    - pairwise_hardpair_experts
    - pairwise_hardpair_error_gates
    - pairwise_hardpair_value_adapters
    - boundary_experts
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 2
  prefetch_factor: 2
  lr: 0.000045
  weight_decay: 0.002
  epochs: 2
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 8000
  grad_clip_norm: 5.0
  log_every_steps: 120

eval:
  batch_size: 16
  max_val_samples_per_class: 120
  max_test_samples_per_class: 120
