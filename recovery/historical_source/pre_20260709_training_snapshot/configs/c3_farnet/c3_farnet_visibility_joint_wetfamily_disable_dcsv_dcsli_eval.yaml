seed: 97
output_dir: E:/perception/friction_affordance_runs/visibility_joint_wetfamily_disable_dcsv_dcsli_eval_20260704

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  backbone: convnext_tiny_visibility_cellular_tensor_coupling_concrete_focus_stem
  embedding_dim: 768
  pretrained: false
  dropout: 0.2
  token_dim: 256
  pair_rank: 8
  triple_rank: 8
  head_type: hardpair_margin_directed_calibrated
  hardpair_margin_scale: 0.22
  hardpair_gate_margin: 1.10
  hardpair_gate_temperature: 4.5
  hardpair_sample_protect_classes:
    - water_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
    - water_concrete_smooth
    - wet_mud
    - wet_gravel
  hardpair_sample_protect_threshold: 0.08
  hardpair_sample_protect_temperature: 30.0
  hardpair_disabled_class_pairs:
    - dry_concrete_severe|dry_concrete_slight
  hardpair_focus_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_smooth
    - water_concrete_smooth
    - dry_mud
    - wet_mud
    - water_mud
    - dry_gravel
    - wet_gravel
  hardpair_protected_classes:
    - dry_asphalt_slight
    - dry_asphalt_severe
    - water_concrete_slight
    - wet_concrete_severe
    - water_gravel
    - melted_snow
  use_physics_branch: true
  physics_dim: 96
  physics_quality_cues: true
  physics_quality_region_cues: false
  use_semantic_physics_attention_branch: true
  semantic_physics_attention_dim: 64
  use_local_physics_field_branch: true
  local_physics_field_dim: 64
  local_physics_field_scale: 0.08
  use_dry_concrete_roughness_vor_residual: true
  dry_concrete_roughness_hidden_dim: 48
  dry_concrete_roughness_scale: 0.12
  dry_concrete_roughness_gate_threshold: 0.12
  dry_concrete_roughness_gate_temperature: 14.0

loss:
  factor_weight: 0.0
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.0
  tournament_weight: 0.0
  counterfactual_weight: 0.0
  reliability_weight: 0.0
  counterfactual_margin: 1.0
  supervise_none: false
  focus_ce_extra_weight: 0.12
  focus_ce_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_smooth
    - water_concrete_smooth
    - dry_mud
    - wet_mud
    - water_mud
    - dry_gravel
    - wet_gravel
  anchor_consistency_weight: 0.66
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.58
  anchor_consistency_protect_confidence: 0.70
  anchor_consistency_protect_margin: 0.20
  anchor_no_flip_weight: 0.30
  anchor_no_flip_nonfocus_only: true
  hardpair_binary_loss_weight: 0.08
  hardpair_margin_loss_weight: 0.04
  hardpair_margin_target: 0.55
  hardpair_margin_teacher_pair_only: true
  hardpair_margin_direction_weight: 0.10
  hardpair_margin_keep_weight: 0.05
  anchor_consistency_exempt_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_smooth
    - water_concrete_smooth
    - dry_mud
    - wet_mud
    - water_mud
    - dry_gravel
    - wet_gravel

train:
  resume_from: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_split_observer_protected_pairflow_screen_20260704/best_checkpoint.pth
  teacher_checkpoint: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/screen_dry_concrete_vor_residual_scale012_lr1e3_s8k_from_anchor/best.pt
  teacher_backbone: convnext_tiny
  teacher_head_type: linear
  trainable_prefixes:
    - backbone.visibility_cellular_tensor_coupling_banks
    - pairwise_hardpair_margin_heads
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 2
  prefetch_factor: 2
  lr: 0.00010
  weight_decay: 0.002
  epochs: 2
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 8000
  grad_clip_norm: 5.0
  log_every_steps: 150

eval:
  batch_size: 16
  max_val_samples_per_class: 120
  max_test_samples_per_class: 120
