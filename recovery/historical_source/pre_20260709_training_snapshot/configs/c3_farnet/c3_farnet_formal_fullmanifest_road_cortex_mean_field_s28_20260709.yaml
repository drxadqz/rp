extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_road_cortex_mean_field_s28_20260709

model:
  # S28: self-designed statistical-physics factor-graph backbone.
  # Each block performs local mean-field inference over RSCD factors:
  # friction state, material state, roughness state, pair potentials, and a
  # learnable third-order friction-material-roughness potential.
  backbone: road_cortex_mean_field_tiny
  pretrained: false

loss:
  anchor_consistency_weight: 0.23
  anchor_consistency_focus_weight: 0.008
  anchor_no_flip_weight: 0.08
  anchor_error_gate_weight: 0.05
  focus_ce_extra_weight: 0.30

train:
  resume_from:
  trainable_prefixes:
  evaluate_initial: false
  lr: 0.00010
  weight_decay: 0.0035
  epochs: 1
  batch_size: 8
  grad_accum_steps: 2
  samples_per_epoch: 0
  amp: true
  balanced_sampling: true
  log_every_steps: 2000
