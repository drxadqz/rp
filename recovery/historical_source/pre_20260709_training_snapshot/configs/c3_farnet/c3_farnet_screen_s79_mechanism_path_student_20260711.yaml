  teacher_logits_cache:
  expert_teacher_checkpoint:
  expert_teacher_logits_cache:
  trainable_prefixes:
  evaluate_initial: false
  lr: 0.00028
  weight_decay: 0.018
  epochs: 1
  batch_size: 4
