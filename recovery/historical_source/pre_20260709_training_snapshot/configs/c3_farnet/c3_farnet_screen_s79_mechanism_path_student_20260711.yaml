    - wet_concrete_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
    - dry_concrete_slight
    - dry_concrete_severe
    - water_asphalt_slight
    - water_asphalt_severe
  anchor_consistency_weight: 0.38
  anchor_consistency_focus_weight: 0.040
  anchor_consistency_focus_low_margin_threshold: 0.22
  anchor_consistency_temperature: 2.5
  anchor_consistency_protect_weight: 0.12
  anchor_consistency_protect_confidence: 0.76
  anchor_consistency_protect_margin: 0.24
  anchor_no_flip_weight: 0.0
  anchor_error_gate_weight: 0.0
  anchor_nonregression_weight: 0.0
  anchor_nonregression_focus_weight: 0.0
  anchor_consistency_exempt_classes:
    - wet_concrete_smooth
    - wet_concrete_slight
    - wet_concrete_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
    - dry_concrete_slight
    - dry_concrete_severe

train:
  resume_from:
