extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_gate_s132_s7_directional_physics_router_20260715

# S132: directional source-reliable boundary router.
# Targeted RSCD factors:
# - friction: dry/wet/water are not merged; each route stays inside its own
#   physically meaningful state unless the validated source/target edge says so.
# - material: concrete/asphalt/loose-surface routes are separated.
# - roughness: only low-margin smooth/slight/severe or mud/gravel boundaries
#   selected by the S7 factor-tensor diagnostic are allowed to move.
# - coupling: every route uses a direction-specific PhysicsTexture gate, e.g.
#   dry-concrete moderate roughness differs from wet-concrete hidden roughness.

model:
  use_source_reliable_boundary_router: true
  source_reliable_boundary_hidden_dim: 48
  source_reliable_boundary_scale: 3.2
  source_reliable_boundary_base_strength: 0.20
  source_reliable_boundary_physics_gate_floor: 0.0
  source_reliable_boundary_gate_temperature: 7.0
  source_reliable_boundary_source_temperature: 24.0
  source_reliable_boundary_learned_gate_bias: -1.8
  source_reliable_boundary_dropout: 0.02
  source_reliable_boundary_routes:
    - source: dry_concrete_smooth
      target: dry_concrete_slight
      topk: 3
      margin: 1.00
      source_f1: 0.907292954264524
      min_source_f1: 0.90
      kind: dry_concrete_roughness
      route_scale: 0.60
    - source: dry_concrete_severe
      target: dry_concrete_slight
      topk: 3
      margin: 0.95
      source_f1: 0.86543759271032
      min_source_f1: 0.78
      kind: dry_concrete_moderate_roughness
      route_scale: 0.72
    - source: wet_concrete_slight
      target: wet_concrete_severe
      topk: 3
      margin: 0.85
      source_f1: 0.8038392321535693
      min_source_f1: 0.74
      kind: wet_concrete_high_roughness
      route_scale: 0.56
    - source: water_asphalt_smooth
      target: water_asphalt_slight
      topk: 3
      margin: 0.75
      source_f1: 0.9375807145931985
      min_source_f1: 0.86
      kind: water_asphalt_shallow_film_roughness
      route_scale: 0.48
    - source: wet_asphalt_slight
      target: wet_asphalt_severe
      topk: 3
      margin: 0.70
      source_f1: 0.8902594640578477
      min_source_f1: 0.82
      kind: wet_asphalt_high_roughness
      route_scale: 0.42
    - source: dry_mud
      target: dry_gravel
      topk: 3
      margin: 0.70
      source_f1: 0.9382296752281893
      min_source_f1: 0.86
      kind: dry_loose_gravel_texture
      route_scale: 0.36

loss:
  focus_ce_extra_weight: 0.18
  focus_ce_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_slight
    - wet_concrete_severe
    - water_asphalt_smooth
    - water_asphalt_slight
    - wet_asphalt_slight
    - wet_asphalt_severe
    - dry_mud
    - dry_gravel
  anchor_consistency_weight: 0.50
  anchor_consistency_focus_weight: 0.008
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.62
  anchor_consistency_protect_confidence: 0.74
  anchor_consistency_protect_margin: 0.22
  anchor_no_flip_weight: 0.48
  anchor_no_flip_nonfocus_only: true
  anchor_nonregression_weight: 0.30
  anchor_nonregression_focus_weight: 0.010
  anchor_nonregression_margin: 0.012
  anchor_nonregression_confidence: 0.70
  anchor_nonregression_teacher_margin: 0.12
  anchor_error_gate_weight: 0.0
  anchor_consistency_exempt_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - wet_concrete_slight
    - wet_concrete_severe
    - water_asphalt_smooth
    - water_asphalt_slight
    - wet_asphalt_slight
    - wet_asphalt_severe
    - dry_mud
    - dry_gravel

train:
  resume_from: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709/best_checkpoint.pth
  teacher_checkpoint: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  teacher_preserve_hardpair_focus: true
  trainable_prefixes:
    - source_reliable_boundary_router
  evaluate_initial: true
  lr: 0.00008
  weight_decay: 0.0012
  epochs: 1
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 0
  prefetch_factor:
  amp: true
  augmentation: true
  balanced_sampling: true
  factor_graph_pair_sampling: true
  factor_graph_pair_sampling_seed: 13215
  factor_graph_pair_sampling_pair_slots: 2
  factor_graph_pair_sampling_positive_slots: 1
  factor_graph_pair_sampling_roughness_focus_scale: 5.0
  factor_graph_pair_sampling_wet_concrete_focus_scale: 3.5
  factor_graph_pair_sampling_wet_water_focus_scale: 1.5
  max_train_samples_per_class: 250
  samples_per_epoch: 6750
  grad_clip_norm: 2.5
  log_every_steps: 125

eval:
  batch_size: 16
  max_val_samples_per_class: 250
  max_test_samples_per_class: 250
