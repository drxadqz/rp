extends: c3_farnet_screen_s148_s96_spectral_pairlocal_wc_tailguard_20260717.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s149_s96_spectral_pairlocal_learned_wc_20260717

# S149: same pair-local non-RSPNet spectral selector as S148, but without the
# hand-coded roughness direction that biased both slight and severe toward the
# severe side. Direction is learned from frequency/stage/logit evidence.

model:
  backbone_spectral_pair_selector_scale: 0.30
  backbone_spectral_pair_selector_gate_margin: 1.28
  backbone_spectral_pair_selector_gate_temperature: 4.2
  backbone_spectral_pair_selector_spectral_margin_threshold: -1.0
  backbone_spectral_pair_selector_spectral_margin_temperature: 8.0
  backbone_spectral_pair_selector_alignment_temperature: 0.0
  backbone_spectral_pair_selector_dropout: 0.0

loss:
  focus_ce_extra_weight: 0.30
  focus_ce_classes:
    - water_concrete_slight
    - water_concrete_severe
  feature_value_boundary_pairwise_loss_weight: 0.42
  feature_value_boundary_pairwise_loss_pairs:
    - water_concrete_slight|water_concrete_severe
  feature_value_boundary_pairwise_pair_weights:
    water_concrete_slight|water_concrete_severe: 3.5
  value_guided_hardpair_margin_weight: 0.070
  value_guided_hardpair_margin_pairs:
    - water_concrete_slight|water_concrete_severe
  value_guided_hardpair_margin_pair_weights:
    water_concrete_slight|water_concrete_severe: 3.2
  anchor_consistency_weight: 0.34
  anchor_consistency_focus_weight: 0.006
  anchor_consistency_protect_weight: 0.64
  anchor_no_flip_weight: 0.48
  anchor_no_flip_nonfocus_only: true
  anchor_nonregression_weight: 0.28
  anchor_nonregression_focus_weight: 0.018

train:
  trainable_prefixes:
    - backbone_spectral_pair_selector
  evaluate_initial: true
  lr: 0.00030
  weight_decay: 0.0008
  factor_graph_pair_sampling_seed: 14917
  factor_graph_pair_sampling_focus_pairs:
    - water_concrete_slight|water_concrete_severe
  factor_graph_pair_sampling_focus_pairs_only: false
  factor_graph_pair_sampling_wet_concrete_focus_scale: 14.0
  factor_graph_pair_sampling_roughness_focus_scale: 5.0
  factor_graph_pair_sampling_wet_water_focus_scale: 2.4
