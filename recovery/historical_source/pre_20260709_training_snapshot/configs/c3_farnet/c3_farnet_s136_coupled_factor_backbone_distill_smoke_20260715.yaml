seed: 136
output_dir: E:/perception_outputs/rscd_surface_classification/s136_coupled_factor_backbone_distill_smoke_20260715

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 128
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  stem_dim: 32
  stage_dims: [64, 128, 256]
  dropout: 0.15

loss:
  class_weight: 1.0
  factor_weight: 0.25
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.4
  coupling_gate_weight: 0.06
  anchor_consistency_weight: 0.05
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.03
  anchor_consistency_protect_confidence: 0.70
  anchor_nonregression_weight: 0.02
  anchor_nonregression_margin: 0.02
  pareto_safe_distill_weight: 0.02
  pareto_safe_margin_weight: 0.01
  pareto_safe_confidence: 0.70
  pareto_safe_teacher_margin: 0.10

train:
  batch_size: 4
  grad_accum_steps: 1
  num_workers: 0
  prefetch_factor:
  lr: 0.0003
  weight_decay: 0.01
  epochs: 1
  amp: false
  augmentation: true
  balanced_sampling: true
  max_train_samples_per_class: 2
  samples_per_epoch: 54
  grad_clip_norm: 5.0
  log_every_steps: 4
  teacher_logits_cache: E:/perception_outputs/rscd_surface_classification/s136_coupled_factor_backbone_distill_smoke_20260715/dummy_teacher_logits_train.pt
  teacher_logits_cache_strict: true

eval:
  batch_size: 4
  max_val_samples_per_class: 2
  max_test_samples_per_class: 2
