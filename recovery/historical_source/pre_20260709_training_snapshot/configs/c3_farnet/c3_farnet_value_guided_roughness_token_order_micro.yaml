seed: 97
output_dir: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_value_guided_roughness_token_order_micro_20260706

data:
  train_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_train.csv
  val_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_val.csv
  test_manifest: E:/perception/friction_affordance_field/data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  embedding_dim: 768
  pretrained: false
  dropout: 0.2
  token_dim: 256
  pair_rank: 8
  triple_rank: 8
  head_type: hardpair_error_gated_calibrated
  hardpair_correction_scale: 0.10
  hardpair_gate_margin: 1.05
  hardpair_gate_temperature: 4.5
  hardpair_error_gate_bias_init: -4.0
  hardpair_error_gate_floor: 0.0
  hardpair_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
  use_physics_branch: true
  physics_dim: 96
  physics_quality_cues: true
  physics_quality_region_cues: false
  use_semantic_physics_attention_branch: true
  semantic_physics_attention_dim: 64
  use_local_physics_field_branch: true
  local_physics_field_dim: 64
  local_physics_field_scale: 0.08
  use_scale_space_roughness_token_conditioner: true
  scale_space_roughness_token_hidden_dim: 64
  scale_space_roughness_token_scale: 0.065
  scale_space_roughness_token_gate_floor: 0.0
  scale_space_roughness_token_dry_tail_weight: 1.0
  scale_space_roughness_token_wet_hidden_tail_weight: 0.55
  use_dry_concrete_roughness_vor_residual: true
  dry_concrete_roughness_hidden_dim: 48
  dry_concrete_roughness_scale: 0.12
  dry_concrete_roughness_gate_threshold: 0.12
  dry_concrete_roughness_gate_temperature: 14.0

loss:
  factor_weight: 0.0
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.0
  tournament_weight: 0.0
  counterfactual_weight: 0.0
  reliability_weight: 0.0
  counterfactual_margin: 1.0
  supervise_none: false
  value_guided_roughness_order_weight: 0.18
  value_guided_roughness_order_margin: 0.46
  value_guided_roughness_order_slight_margin_scale: 0.55
  value_guided_roughness_order_min_weight: 0.16
  value_guided_roughness_order_material:
    - concrete
  value_guided_roughness_order_friction:
    - dry
    - wet
    - water
  focus_ce_extra_weight: 0.05
  focus_ce_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
    - wet_concrete_smooth
    - wet_concrete_slight
    - wet_concrete_severe
  anchor_consistency_weight: 0.62
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.58
  anchor_consistency_protect_confidence: 0.70
  anchor_consistency_protect_margin: 0.20
  anchor_no_flip_weight: 0.32
  anchor_no_flip_nonfocus_only: false
  anchor_consistency_exempt_classes:
    - dry_concrete_smooth
    - dry_concrete_slight
    - dry_concrete_severe
    - water_concrete_smooth
    - water_concrete_slight
    - water_concrete_severe
    - wet_concrete_smooth
    - wet_concrete_slight
    - wet_concrete_severe

train:
  resume_from: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_errorgate_paircal_screen_20260703/best_checkpoint.pth
  teacher_checkpoint: D:/NMI_SPWFM_datasets/friction_affordance_outputs/rscd_surface_classification/c3_farnet_errorgate_paircal_screen_20260703/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  trainable_prefixes:
    - scale_space_roughness_token_conditioner.roughness_projector
    - scale_space_roughness_token_conditioner.coupling_projector
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 2
  prefetch_factor: 2
  lr: 0.00032
  weight_decay: 0.0015
  epochs: 1
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 6000
  grad_clip_norm: 5.0
  log_every_steps: 150

eval:
  batch_size: 16
  max_val_samples_per_class: 120
  max_test_samples_per_class: 120
