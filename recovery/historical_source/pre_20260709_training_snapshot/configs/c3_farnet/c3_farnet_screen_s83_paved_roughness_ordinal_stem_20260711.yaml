extends: c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709.yaml

output_dir: E:/perception_outputs/rscd_surface_classification/c3_farnet_screen_s83_paved_roughness_ordinal_stem_20260711

model:
  backbone: convnext_tiny_paved_roughness_ordinal_stem
  pretrained: false
  head_type: hardpair_error_gated_calibrated
  use_source_reliable_boundary_router: true

loss:
  focus_ce_extra_weight: 0.26
  focus_ce_classes:
    - dry_asphalt_slight
    - dry_asphalt_severe
    - dry_concrete_slight
    - dry_concrete_severe
    - water_asphalt_slight
    - water_asphalt_severe
    - water_concrete_slight
    - water_concrete_severe
    - wet_asphalt_slight
    - wet_asphalt_severe
    - wet_concrete_slight
    - wet_concrete_severe
  anchor_consistency_weight: 0.52
  anchor_consistency_focus_weight: 0.010
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.42
  anchor_consistency_protect_confidence: 0.72
  anchor_consistency_protect_margin: 0.22
  anchor_no_flip_weight: 0.22
  anchor_no_flip_nonfocus_only: true
  anchor_error_gate_weight: 0.0
  anchor_nonregression_weight: 0.08
  anchor_nonregression_focus_weight: 0.025
  anchor_nonregression_margin: 0.014
  anchor_nonregression_confidence: 0.70
  anchor_nonregression_teacher_margin: 0.12
  anchor_consistency_exempt_classes:
    - dry_asphalt_slight
    - dry_asphalt_severe
    - dry_concrete_slight
    - dry_concrete_severe
    - water_asphalt_slight
    - water_asphalt_severe
    - water_concrete_slight
    - water_concrete_severe
    - wet_asphalt_slight
    - wet_asphalt_severe
    - wet_concrete_slight
    - wet_concrete_severe

train:
  resume_from: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709/best_checkpoint.pth
  teacher_checkpoint: E:/perception_outputs/rscd_surface_classification/c3_farnet_formal_fullmanifest_source_reliable_router_s7_20260709/best_checkpoint.pth
  teacher_backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  teacher_head_type: hardpair_error_gated_calibrated
  teacher_preserve_hardpair_focus: true
  trainable_prefixes:
    - backbone.features.0
    - backbone.features.1
    - backbone.gate_calibrated_tensor_coupling_banks
    - backbone.paved_roughness_ordinal_conditioners
  evaluate_initial: true
  lr: 0.000025
  weight_decay: 0.0016
  epochs: 1
  batch_size: 4
  grad_accum_steps: 4
  num_workers: 2
  prefetch_factor: 2
  amp: true
  augmentation: true
  balanced_sampling: true
  max_train_samples_per_class: 1000
  samples_per_epoch: 27000
  grad_clip_norm: 4.0
  log_every_steps: 500

eval:
  batch_size: 16
  max_val_samples_per_class: 250
  max_test_samples_per_class: 250
