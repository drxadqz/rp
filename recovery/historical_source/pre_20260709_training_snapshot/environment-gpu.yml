name: faf_gpu
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - --extra-index-url
      - https://download.pytorch.org/whl/cu128
      - torch==2.11.0+cu128
      - torchvision==0.26.0+cu128
      - numpy
      - pandas
      - Pillow
      - PyYAML
      - scikit-learn
      - tqdm
      - opencv-python
      - tensorboard
      - timm
