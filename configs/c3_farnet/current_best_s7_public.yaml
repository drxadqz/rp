seed: 97
output_dir: outputs/current_best_s7

data:
  train_manifest: data/manifests_full/rscd_prepared_train.csv
  val_manifest: data/manifests_full/rscd_prepared_val.csv
  test_manifest: data/manifests_full/rscd_prepared_test.csv
  image_size: 192
  train_resize_mode: letterbox
  eval_resize_mode: letterbox

model:
  backbone: convnext_tiny_gate_calibrated_tensor_coupling_concrete_film_rough_stem
  embedding_dim: 768
  pretrained: false
  dropout: 0.2
  token_dim: 256
  pair_rank: 8
  triple_rank: 8
  head_type: hardpair_error_gated_calibrated
  hardpair_correction_scale: 0.10
  hardpair_gate_margin: 1.05
  hardpair_gate_temperature: 4.5
  hardpair_error_gate_bias_init: -4.0
  hardpair_error_gate_floor: 0.0
  hardpair_focus_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
  use_physics_branch: true
  physics_dim: 96
  physics_quality_cues: true
  physics_quality_region_cues: false
  use_semantic_physics_attention_branch: true
  semantic_physics_attention_dim: 64
  use_local_physics_field_branch: true
  local_physics_field_dim: 64
  local_physics_field_scale: 0.08
  use_dry_concrete_roughness_vor_residual: true
  dry_concrete_roughness_hidden_dim: 48
  dry_concrete_roughness_scale: 0.12
  dry_concrete_roughness_gate_threshold: 0.12
  dry_concrete_roughness_gate_temperature: 14.0
  use_source_reliable_boundary_router: true
  source_reliable_boundary_hidden_dim: 32
  source_reliable_boundary_scale: 7.0
  source_reliable_boundary_base_strength: 1.0
  source_reliable_boundary_physics_gate_floor: 0.5
  source_reliable_boundary_gate_temperature: 6.0
  source_reliable_boundary_source_temperature: 28.0
  source_reliable_boundary_learned_gate_bias: -1.6
  source_reliable_boundary_dropout: 0.0
  source_reliable_boundary_routes:
    - source: dry_concrete_smooth
      target: dry_concrete_slight
      topk: 3
      margin: 1.00
      source_f1: 0.907292954264524
      min_source_f1: 0.90
      kind: dry_concrete_roughness

loss:
  factor_weight: 0.0
  factor_axis_weights:
    friction: 1.0
    material: 1.0
    roughness: 1.0
  tournament_weight: 0.0
  counterfactual_weight: 0.0
  reliability_weight: 0.0
  counterfactual_margin: 1.0
  supervise_none: false
  focus_ce_extra_weight: 0.3
  focus_ce_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe
  anchor_consistency_weight: 0.55
  anchor_consistency_focus_weight: 0.015
  anchor_consistency_focus_low_margin_threshold: 0.18
  anchor_consistency_temperature: 2.0
  anchor_consistency_protect_weight: 0.42
  anchor_consistency_protect_confidence: 0.7
  anchor_consistency_protect_margin: 0.2
  anchor_no_flip_weight: 0.22
  anchor_no_flip_nonfocus_only: true
  anchor_error_gate_weight: 0.1
  anchor_error_gate_pos_weight: 10.0
  anchor_error_gate_pair_error_only: true
  anchor_consistency_exempt_classes:
    - water_concrete_slight
    - wet_concrete_slight
    - water_concrete_severe
    - wet_concrete_severe

train:
  # Optional warm-start checkpoints used in the historical S7 run are not
  # distributed in this repository. Set these paths if available.
  resume_from:
  teacher_checkpoint:
  teacher_backbone: convnext_tiny
  teacher_head_type: linear
  trainable_prefixes:
    - backbone.gate_calibrated_tensor_coupling_banks
    - pairwise_hardpair_experts
    - pairwise_hardpair_error_gates
  evaluate_initial: false
  batch_size: 8
  grad_accum_steps: 2
  num_workers: 2
  prefetch_factor: 2
  lr: 0.00003
  weight_decay: 0.002
  epochs: 1
  amp: true
  augmentation: true
  balanced_sampling: true
  samples_per_epoch: 0
  grad_clip_norm: 5.0
  log_every_steps: 2000

eval:
  batch_size: 32
  max_val_samples_per_class:
  max_test_samples_per_class:
